name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Run tests (no real services needed)
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          OPENAI_API_KEY: sk-test-fake-key
          QDRANT_URL: http://localhost:6333
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_SECRET_KEY: ""
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-platform:ci .

      - name: Start services
        run: |
          docker network create rag-net
          docker run -d --name qdrant --network rag-net -p 6333:6333 qdrant/qdrant:v1.13.0
          docker run -d --name postgres --network rag-net \
            -e POSTGRES_USER=rag \
            -e POSTGRES_PASSWORD=rag \
            -e POSTGRES_DB=rag \
            -p 5432:5432 \
            postgres:16-alpine

      - name: Wait for services
        run: |
          sleep 10
          docker exec postgres pg_isready -U rag -d rag || (echo "Postgres not ready" && exit 1)

      - name: Run app container
        run: |
          docker run -d --name app --network rag-net -p 8000:8000 \
            -e DATABASE_URL=postgresql+asyncpg://rag:rag@postgres:5432/rag \
            -e QDRANT_URL=http://qdrant:6333 \
            -e OPENAI_API_KEY=sk-test-ci-fake \
            -e LANGFUSE_PUBLIC_KEY="" \
            -e LANGFUSE_SECRET_KEY="" \
            rag-platform:ci

      - name: Wait for app
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 3
          done
          docker logs app
          exit 1

      - name: Verify /health responds
        run: |
          curl -sf http://localhost:8000/health
          curl -sf http://localhost:8000/health/db

      - name: Cleanup
        if: always()
        run: |
          docker stop app qdrant postgres || true
          docker rm app qdrant postgres || true
          docker network rm rag-net || true
